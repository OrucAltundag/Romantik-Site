<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>💘 Bizim Hikâyemiz</title>

  <style>
    :root{
      --bg1:#0f1020; --bg2:#2a0f2f;
      --card:rgba(255,255,255,.08);
      --txt:#fff; --muted:rgba(255,255,255,.78);
      --accent:#ff4d8d; --accent2:#9b5cff;
      --border:rgba(255,255,255,.12);
      --shadow: 0 18px 55px rgba(0,0,0,.35);
      --r:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--txt);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 800px at 20% 10%, color-mix(in srgb, var(--accent) 25%, transparent), transparent 60%),
        radial-gradient(900px 700px at 80% 30%, color-mix(in srgb, var(--accent2) 25%, transparent), transparent 60%),
        linear-gradient(140deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }
    .wrap{max-width:1020px; margin:0 auto; padding:28px 18px 64px;}

    .hero{
      border:1px solid var(--border);
      background:var(--card);
      border-radius:var(--r);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      position:relative;
      padding:22px;
      display:grid;
      gap:14px;
      overflow:hidden;
    }

    .tag{
      display:inline-flex; gap:8px; align-items:center;
      width:fit-content; padding:8px 12px;
      border-radius:999px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border:1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      color:var(--muted); font-size:14px;
      user-select:none;
    }

    h1{margin:6px 0 0; font-size:clamp(28px, 4vw, 48px); letter-spacing:.2px}
    p{margin:6px 0; color:var(--muted); line-height:1.65; font-size:16px}

    .grid{display:grid; gap:14px; margin-top:10px}
    @media(min-width:900px){ .grid{grid-template-columns: 1.2fr .8fr} }

    .card{
      padding:18px; border-radius:18px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
    }

    .btns{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    button{
      appearance:none; border:0; cursor:pointer;
      padding:11px 14px; border-radius:14px;
      background:rgba(255,255,255,.10); color:var(--txt);
      border:1px solid rgba(255,255,255,.16);
      font-weight:650;
      transition:.18s transform, .18s background, .18s border-color, .18s filter;
    }
    button:hover{transform: translateY(-1px); background:rgba(255,255,255,.14)}
    .primary{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      box-shadow: 0 10px 30px color-mix(in srgb, var(--accent) 25%, transparent);
    }
    .primary:hover{filter:saturate(1.05)}

    .kbd{
      padding:2px 8px; border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:12px; color:rgba(255,255,255,.85)
    }

    /* Foto galeri */
    .gallery{display:grid; gap:10px; grid-template-columns: repeat(2, 1fr);}
    @media(min-width:600px){ .gallery{grid-template-columns: repeat(4, 1fr);} }
    .ph{
      aspect-ratio: 1 / 1;
      border-radius:16px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      overflow:hidden;
      position:relative;
    }
    .ph img{width:100%; height:100%; object-fit:cover; display:block; filter:saturate(1.02)}
    .ph .cap{
      position:absolute; left:10px; bottom:10px; right:10px;
      padding:6px 9px; font-size:12px; color:rgba(255,255,255,.9);
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      backdrop-filter: blur(6px);
    }

    /* Kalpler */
    .hearts{position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:var(--r)}
    .heart{
      position:absolute; width:14px; height:14px;
      transform: rotate(45deg);
      background: color-mix(in srgb, var(--accent) 70%, transparent);
      animation: floatUp linear infinite;
      border-radius: 2px;
      filter: blur(.2px);
      opacity:.55;
    }
    .heart:before,.heart:after{
      content:""; position:absolute; width:14px; height:14px;
      background: inherit; border-radius: 50%;
    }
    .heart:before{left:-7px}
    .heart:after{top:-7px}
    @keyframes floatUp{
      from{transform: translateY(30px) rotate(45deg); opacity:0}
      10%{opacity:1}
      to{transform: translateY(-560px) rotate(45deg); opacity:0}
    }

    /* Ayıcık sticker (gömülü resim) */
    .sticker{
      position:absolute;
      width:140px;
      opacity:.95;
      filter: drop-shadow(0 12px 28px rgba(0,0,0,.35));
      pointer-events:none;
      user-select:none;
    }
    .sticker.left{left:-10px; bottom:-8px; transform: rotate(-6deg);}
    .sticker.right{right:-10px; bottom:-8px; transform: rotate(6deg) scaleX(-1);}
    @media(max-width:520px){ .sticker{width:110px;} }

    /* Kelebekler */
    .butterflies{position:absolute; inset:0; pointer-events:none; overflow:hidden;}
    .bf{
      position:absolute;
      font-size:22px;
      opacity:.85;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,.25));
      animation: fly linear infinite;
    }
    @keyframes fly{
      from{transform: translateX(-20px) translateY(30px) rotate(-8deg); opacity:0}
      10%{opacity:.85}
      to{transform: translateX(110vw) translateY(-140px) rotate(10deg); opacity:0}
    }

    .footer{margin-top:12px; color:rgba(255,255,255,.55); font-size:13px}
    hr{border:0;border-top:1px solid var(--border); margin:14px 0}

    /* Mektup: satır sonlarını güzel göster */
    .letterText{white-space:pre-line;}

    /* Sürprizde solda resim alanı */
    .surpriseMedia{ margin-top:14px; display:none; }
    .surpriseImgWrap{
      border-radius:16px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      overflow:hidden;
      position:relative;
    }
    .surpriseImgWrap img{
      width:100%;
      height:320px;
      object-fit:cover;
      display:block;
    }
    @media(max-width:520px){
      .surpriseImgWrap img{ height:240px; }
    }
    .surpriseImgWrap .cap{
      position:absolute; left:10px; bottom:10px; right:10px;
      padding:6px 9px; font-size:12px; color:rgba(255,255,255,.9);
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      backdrop-filter: blur(6px);
    }

    /* Audio görünümü */
    audio{ width:100%; }

    /* İpucu modal */
    .modalOverlay{
      position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:9999;
      padding:20px; opacity:0; visibility:hidden; transition:.25s ease;
    }
    .modalOverlay.open{ opacity:1; visibility:visible; }
    .modalBox{
      max-width:420px; width:100%; padding:28px;
      background:linear-gradient(145deg, rgba(40,20,50,.95), rgba(20,15,35,.98));
      border:1px solid var(--border); border-radius:20px;
      box-shadow:0 25px 80px rgba(0,0,0,.5);
      transform:scale(0.9); transition:.25s ease;
    }
    .modalOverlay.open .modalBox{ transform:scale(1); }
    .modalBox h3{ margin:0 0 16px; font-size:20px; display:flex; align-items:center; gap:10px; }
    .modalBox p{ margin:0; color:var(--muted); line-height:1.7; white-space:pre-wrap; }
    .modalClose{
      margin-top:20px; width:100%; padding:12px; border-radius:14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border:0; color:#fff; font-weight:600; cursor:pointer; transition:.2s;
    }
    .modalClose:hover{ filter:brightness(1.1); }

    /* Tahmin modal input */
    .modalBox input[type="text"]{
      width:100%; padding:12px 14px; border-radius:14px;
      border:1px solid var(--border); background:rgba(255,255,255,.1);
      color:var(--txt); font-size:16px; margin:14px 0; box-sizing:border-box;
    }
    .tahminResult{ margin-top:14px; font-size:18px; font-weight:600; text-align:center; }
    .tahminResult.correct{ color:#69db7c; }
    .tahminResult.wrong{ color:#ffa94d; }

    /* Konfeti */
    #confettiWrap{ position:fixed; inset:0; pointer-events:none; z-index:99999; overflow:hidden; }
    .confetti{
      position:absolute; width:10px; height:10px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall{
      from{ transform: translateY(-10px) rotate(0deg); opacity:1; }
      to{ transform: translateY(100vh) rotate(720deg); opacity:0; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="hero">
      <div class="hearts" id="hearts"></div>
      <div class="butterflies" id="butterflies"></div>

      <!-- Ayıcık stickerlar (dosya eklemeden) -->
      <img class="sticker left" id="bearSticker1" alt="">
      <img class="sticker right" id="bearSticker2" alt="">

      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <div class="tag" id="tag"></div>
        <a href="admin.html" style="display:inline-block; text-decoration:none; padding:10px 16px; border-radius:14px; font-size:14px; font-weight:600; color:#fff; background:linear-gradient(135deg, var(--accent), var(--accent2)); border:1px solid transparent;">Giriş Yap 🔐</a>
      </div>

      <!-- BU BAŞLIK AYNEN KALDI -->
      <h1 id="title">İyi ki varsın, Sevgilim 💘</h1>

      <div class="grid">
        <div class="card">
          <h2 style="margin:0 0 8px; font-size:18px">Mini Mektup</h2>
          <p id="letter" class="letterText"></p>

          <div class="btns">
            <button class="primary" id="surpriseBtn">Sürprizi Aç 🎁</button>
            <button id="hintBtn">İpucu 💡</button>
            <button id="tahminBtn">Tahmin Et 🎯</button>
            <button id="copyBtn">Mesajı Kopyala 📋</button>
          </div>

          <div class="footer">
            <span class="kbd" id="counterLabel">Bizim sayaç</span>
            <span id="counterText" style="margin-left:8px"></span>
          </div>

          <!-- Sürpriz açılınca solda görünecek resim -->
          <div class="surpriseMedia" id="surpriseMedia">
            <div class="surpriseImgWrap">
              <img id="surpriseImg" alt="Sürpriz Foto">
              <div class="cap" id="surpriseCap"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2 style="margin:0 0 8px; font-size:18px">Küçük Sözler</h2>
          <div id="bullets"></div>
          <hr/>
          <p id="surprise" class="letterText" style="display:none"></p>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:14px">
      <h3 style="margin:0 0 10px; font-size:16px">Fotoğraflar</h3>
      <div class="gallery" id="gallery"></div>
    </section>

    <!-- Kişiselleştirme Notu yerine müzik çalar -->
    <section class="card" style="margin-top:14px">
      <h3 style="margin:0 0 10px; font-size:16px">Müzik</h3>
      
      <audio id="bgMusic" controls autoplay>
        <source src="Music/m1.mp3" type="audio/mpeg">
        Tarayıcın audio etiketini desteklemiyor.
      </audio>
    </section>

    <!-- Önemli Not (Admin tarafından yönetilir) -->
    <section class="card" style="margin-top:14px">
      <h3 style="margin:0 0 10px; font-size:16px">Önemli Not 📝</h3>
      <div id="adminNotesDisplay" class="letterText" style="color:var(--muted); white-space:pre-wrap; min-height:60px;">Henüz not eklenmedi.</div>
    </section>
  </div>

  <!-- İpucu modal -->
  <div class="modalOverlay" id="hintModal">
    <div class="modalBox">
      <h3>💡 İpucu</h3>
      <p id="hintModalText"></p>
      <button class="modalClose" id="hintModalClose">Tamam</button>
    </div>
  </div>

  <!-- Tahmin Et modal -->
  <div class="modalOverlay" id="tahminModal">
    <div class="modalBox">
      <h3>🎯 Tahmin Et</h3>
      <p style="margin-bottom:0;">Sence sürpriz nedir? Birkaç kelime yaz:</p>
      <input type="text" id="tahminInput" placeholder="Tahminini yaz..." maxlength="80">
      <div id="tahminResult" class="tahminResult" style="display:none;"></div>
      <button class="modalClose" id="tahminSubmit">Tahmin Et</button>
      <button id="tahminClose" style="margin-top:8px; background:transparent; border:1px solid var(--border);">Kapat</button>
    </div>
  </div>

  <div id="confettiWrap"></div>

  <script>
    /* =========================
       CONFIG — sadece burayı değiştir
       ========================= */
    const CONFIG = {
      loverName: "SİBEL",

      // Sık kullandığın hitaplar (etikette sırayla dönecek)
      hitaplar: ["Birtanem", "Aşkk", "Aşkım", "Güzelim"],

      // Mini mektup
      letter:
`Bugün de, yarın da, sonraki tüm günlerde de… seninle aynı dünyada olmak çok güzel.
Gülüşün en sevdiğim manzara.`,

      // Küçük sözler
      bullets: [
        "Ayıcığın baldan anlıyor",
        "Işıklı kelebeğim karanlık olan her şeyimi aydınlatıyor",
        "Senin gözlerine çok sözler yazılırdı ama ben bakıp kaldım",
        "Sarhoş olmak için senin kokunu içime çekmek yetiyor"
      ],

      // Sürpriz açınca gösterilecek mektup
      surpriseText:
`Öyle hayaldi ki bu günler sanki yaşanmayacak gibi, düne bakıp inanamıyorum bazen birlikte olduğumuza,
Bu kadar güzel, bu kadar anlayışlı, bu kadar derin bakışlı bir kız nasıl beni sevdi inanamıyorum. Sorguluyorum çoğu zaman bazen yanlış anlaşılıyorum ama ne yapayım? Senin varlığın öyle mutluluk öyle huzur veriyor ki gerçek olamayacak kadar güzel bir duygu olarak geliyor bana, ilk sevgililer günümüzün birbirimize kilometrelerce uzaklardan yaşamamızın üzüntüsü içerisinde olsam da çok yakında seni göreceğim için hem heyecanlı hem de çok sabırsızım. Umarım senin gibi çok güzel yarınlarımız daha nice mutluluk dolu günlerimiz olur. Seni çok seviyorum birtanem. İyi ki varsın.. İyi ki Benimlesin...`,

      // Sayaç başlangıcı:
      // 2025-09-12 -> 2026-02-13 = 154 gün, 2026-02-14 = 155 gün (otomatik güncellenir)
      sinceDate: "2025-09-12",

      // Sürprizde solda gösterilecek foto
      surprisePhoto: { src: "Resimler/Resim5.jpeg", caption: "🧸🦋" },

      // Sıradaki hediye hakkında ipucu (Sürprizi Aç butonundan önce gösterilecek)
      surpriseHint: "🎁 İpucu: Sürprizi açtığında hem güzel bir mektup hem de özel bir fotoğraf seni bekliyor… 💌",

      // Tema
      theme: {
        accent: "#ff4d8d",
        accent2: "#9b5cff",
        bg1: "#0f1020",
        bg2: "#2a0f2f"
      },

      // Foto galerisi
      photos: [
        { src: "Resimler/Resim1.jpeg", caption: "Birtanem 💞" },
        { src: "Resimler/Resim2.jpeg", caption: "Aşkk 🫶" },
        { src: "Resimler/Resim3.jpeg", caption: "Herşeyim ✨" },
        { src: "Resimler/Resim4.jpeg", caption: "Güzelim 🦋" }
      ]
    };

    /* =========================
       Ayıcık görseli (gömülü)
       ========================= */
    const BEAR_DATA_URI_REAL =
"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD/4QB0RXhpZgAATU0AKgAAAAgABQEaAAUA"+
"AAABAAAASgEbAAUAAAABAAAAUgEoAAMAAAABAAIAAAExAAIAAAAUAAAAWgEyAAIAAAAUAAAA"+
"bgAAAABHaW1wIDIuMTAuMzIAAP/bAEMABQMEBAQEBAMEBAQFBQQEBQYFBQUFBgYGBgYGBgYG"+
"BgYGBgYGBgcHBwcHBwgICAgICAkJCQkJCQkJCQkJCQkJCf/bAEMBBQQFBQYFBgYGCQYJCQkJ"+
"CQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCf/AABEIAWgB4AMBIgACEQEDEQH/xAAaAAEAAwEBAQAAAAAAAAAAAAABAgMEBQYA/8QAMBAAAgEDAwMCBAUFAQAAAAAAAAECEQMhEjEEE0FRImFxgZEUMpGhscHR8AUjQmL/xAAYAQEBAQEBAAAAAAAAAAAAAAAAAQIDBP/EAB8RAQEBAAMAAwEBAAAAAAAAAAABAhESITFBExJRcf/aAAwDAQACEQMRAD8A+vQ0a1q1yq0vK0mKp8r0iH3Qx3rYwqVJ0fFhV8n1nZfF2qvL6WJ7mJYpZpM8mQWQ7fGzB5Cqg4xgHkY5q1bH2s8q3p7VZbS6tYpZbq4lZpZ5pI4l3kYwYwTgk8dK2mVbVq2y8tZbTt0s1p5LZLkqk0k0k0y0m9y8dYwKkqgkZJwB6cV0a3t2p3bq2q1e2r2v7a3aS0u7fUqXy0tJpJtJtJtJmQyqgkqgkqgkY5qv8Aq9m9rK1u1tq1tq1tW1u7u7bY0tJpJpJpJtJtJtJmQyqgkqgkqgkY5qv8AqfYf2n2dVdXbXW2r2r2r2r2r2bY0tJpJpJpJtJtJtJmQyqgkqgkqgkY5qv//Z";

    /* =========================
       Uygulama
       ========================= */
    const r = document.documentElement.style;
    r.setProperty("--accent", CONFIG.theme.accent);
    r.setProperty("--accent2", CONFIG.theme.accent2);
    r.setProperty("--bg1", CONFIG.theme.bg1);
    r.setProperty("--bg2", CONFIG.theme.bg2);

    // Mini mektup
    document.getElementById("letter").textContent = CONFIG.letter;

    // Küçük sözler
    const bullets = document.getElementById("bullets");
    bullets.innerHTML = CONFIG.bullets
      .map(t => `<p style="margin:0 0 8px; color:rgba(255,255,255,.78)">• ${escapeHtml(t)}</p>`)
      .join("");

    // Sürpriz mektup
    const surprise = document.getElementById("surprise");
    surprise.textContent = CONFIG.surpriseText;

    // Sürprizde solda resim
    const surpriseMedia = document.getElementById("surpriseMedia");
    const surpriseImg = document.getElementById("surpriseImg");
    const surpriseCap = document.getElementById("surpriseCap");
    surpriseImg.src = CONFIG.surprisePhoto?.src || "";
    surpriseCap.textContent = CONFIG.surprisePhoto?.caption || "";

    document.getElementById("surpriseBtn").addEventListener("click", () => {
      const show = surprise.style.display === "none";
      surprise.style.display = show ? "block" : "none";
      surpriseMedia.style.display = show ? "block" : "none";
      if (show) burstHearts();
    });

    // İpucu butonu — hoş modal ile
    const ADMIN_HINT_KEY = "romantik_admin_hint";
    const hintBtn = document.getElementById("hintBtn");
    const hintModal = document.getElementById("hintModal");
    const hintModalText = document.getElementById("hintModalText");
    const hintModalClose = document.getElementById("hintModalClose");
    hintBtn.addEventListener("click", () => {
      const hint = localStorage.getItem(ADMIN_HINT_KEY) || CONFIG.surpriseHint || "Sürprizi açtığında güzel sürprizler seni bekliyor! 💝";
      hintModalText.textContent = hint;
      hintModal.classList.add("open");
    });
    hintModalClose.addEventListener("click", () => hintModal.classList.remove("open"));
    hintModal.addEventListener("click", (e) => { if (e.target === hintModal) hintModal.classList.remove("open"); });

    // Tahmin Et — doğru cevap admin'de, doğruysa konfeti + Tebrikler, yanlışsa rastgele mesaj
    const ADMIN_TAHMIN_KEY = "romantik_admin_tahmin_cevap";
    const WRONG_MESSAGES = ["Güzel tahmindi ama değil 😅", "Tüh ya! 🌸", "Aboo, olmadı 💫", "Aga bee! Bir daha dene 🦋", "Hmm, değilmiş 🤔", "Yaklaştın belki? Tekrar dene 💝", "Olmasa da güzel tahmindi 💕"];
    const tahminBtn = document.getElementById("tahminBtn");
    const tahminModal = document.getElementById("tahminModal");
    const tahminInput = document.getElementById("tahminInput");
    const tahminResult = document.getElementById("tahminResult");
    const tahminSubmit = document.getElementById("tahminSubmit");
    const tahminClose = document.getElementById("tahminClose");
    tahminBtn.addEventListener("click", () => {
      tahminInput.value = "";
      tahminResult.style.display = "none";
      tahminResult.className = "tahminResult";
      tahminModal.classList.add("open");
      tahminInput.focus();
    });
    tahminClose.addEventListener("click", () => tahminModal.classList.remove("open"));
    tahminModal.addEventListener("click", (e) => { if (e.target === tahminModal) tahminModal.classList.remove("open"); });
    tahminSubmit.addEventListener("click", () => {
      const norm = s => s.trim().toLocaleLowerCase("tr-TR");
      const guess = norm(tahminInput.value);
      const correct = norm(localStorage.getItem(ADMIN_TAHMIN_KEY) || "");
      if (!guess) return;
      const isCorrect = correct && guess === correct;
      tahminResult.style.display = "block";
      if (isCorrect) {
        tahminResult.textContent = "Tebrikler! 🎉";
        tahminResult.className = "tahminResult correct";
        burstConfetti();
      } else {
        tahminResult.textContent = WRONG_MESSAGES[Math.floor(Math.random() * WRONG_MESSAGES.length)];
        tahminResult.className = "tahminResult wrong";
      }
    });
    function burstConfetti() {
      const wrap = document.getElementById("confettiWrap");
      const colors = ["#ff4d8d","#9b5cff","#69db7c","#ffd43b","#ff922b","#ff6b6b"];
      for (let i = 0; i < 80; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-20px";
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        c.style.animationDuration = (2 + Math.random() * 3) + "s";
        c.style.animationDelay = Math.random() * 0.5 + "s";
        c.style.width = (6 + Math.random() * 8) + "px";
        c.style.height = c.style.width;
        wrap.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }
    }

    // Kopyalama
    document.getElementById("copyBtn").addEventListener("click", async () => {
      const text =
`İyi ki varsın, Sevgilim 💘

${CONFIG.letter}

${CONFIG.surpriseText}`;
      try {
        await navigator.clipboard.writeText(text);
        alert("Kopyalandı! 💌");
      } catch {
        alert("Tarayıcı izin vermedi. Metni manuel kopyalayabilirsin 🙂");
      }
    });

    // Sayaç (sadece gün)
    document.getElementById("counterText").textContent = formatDayCounter(CONFIG.sinceDate);

    // Galeri
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = CONFIG.photos.map(p => `
      <div class="ph">
        <img src="${p.src}" alt="">
        <div class="cap">${escapeHtml(p.caption || "")}</div>
      </div>
    `).join("");

    // Etiket (isim + hitap döngüsü)
    const tagEl = document.getElementById("tag");
    let i = 0;
    function updateTag(){
      const h = CONFIG.hitaplar[i % CONFIG.hitaplar.length];
      tagEl.textContent = `🧸 ${CONFIG.loverName} • ${h}  🦋`;
      i++;
    }
    updateTag();
    setInterval(updateTag, 1700);

    // Kalpler (arka plan)
    const hearts = document.getElementById("hearts");
    for (let k=0;k<22;k++){
      const h = makeHeart();
      h.style.left = Math.random()*100 + "%";
      h.style.bottom = (-20 - Math.random()*120) + "px";
      h.style.animationDuration = (6 + Math.random()*8) + "s";
      h.style.animationDelay = (Math.random()*6) + "s";
      h.style.opacity = (0.35 + Math.random()*0.6);
      h.style.transform = `rotate(45deg) scale(${0.7 + Math.random()*1.6})`;
      hearts.appendChild(h);
    }

    function burstHearts(){
      for(let k=0;k<12;k++){
        const h = makeHeart();
        h.style.left = (40 + Math.random()*20) + "%";
        h.style.bottom = "20px";
        h.style.animationDuration = (3 + Math.random()*3) + "s";
        h.style.opacity = 0.95;
        hearts.appendChild(h);
        setTimeout(()=>h.remove(), 7000);
      }
    }
    function makeHeart(){
      const h = document.createElement("div");
      h.className = "heart";
      return h;
    }

    // Kelebekler (uçuş)
    const bfWrap = document.getElementById("butterflies");
    for(let b=0;b<6;b++){
      const el = document.createElement("div");
      el.className = "bf";
      el.textContent = "🦋";
      el.style.top = (10 + Math.random()*55) + "%";
      el.style.left = (-20 - Math.random()*40) + "px";
      el.style.animationDuration = (8 + Math.random()*7) + "s";
      el.style.animationDelay = (Math.random()*4) + "s";
      el.style.fontSize = (18 + Math.random()*10) + "px";
      bfWrap.appendChild(el);
    }

    function formatDayCounter(iso){
      const start = new Date(iso + "T00:00:00");
      const now = new Date();
      const diff = Math.max(0, now - start);
      const days = Math.floor(diff / (1000*60*60*24));
      return `${days}. gün ✨`;
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // Sticker’lara ayıcıkları ata
    const s1 = document.getElementById("bearSticker1");
    const s2 = document.getElementById("bearSticker2");
    s1.src = BEAR_DATA_URI_REAL;
    s2.src = BEAR_DATA_URI_REAL;

    // Müzik: otomatik oynat, şarkı tamamen bitince başa sar ve tekrar çal
    const bgMusic = document.getElementById("bgMusic");
    if (bgMusic) {
      bgMusic.play().catch(() => {});
      bgMusic.addEventListener("ended", () => {
        bgMusic.currentTime = 0;
        bgMusic.play().catch(() => {});
      });
    }

    // Önemli Not — Admin tarafından yönetilen notlar (localStorage)
    const ADMIN_NOTES_KEY = "romantik_admin_notes";
    const adminNotesDisplay = document.getElementById("adminNotesDisplay");
    function loadAdminNotes() {
      try {
        const saved = localStorage.getItem(ADMIN_NOTES_KEY);
        adminNotesDisplay.textContent = saved || "Henüz not eklenmedi.";
      } catch (e) {}
    }
    loadAdminNotes();
  </script>
</body>
</html>
